# MongoDB 配置文件
# 赛博算命数据库配置

# 数据存储路径
storage:
  dbPath: ./data/db
  journal:
    enabled: true

# 日志配置
systemLog:
  destination: file
  logAppend: true
  path: ./logs/mongod.log

# 网络配置
net:
  port: 27017
  bindIp: 127.0.0.1

# 安全配置（开发环境可关闭）
# security:
#   authorization: enabled

# 进程管理
processManagement:
  fork: false  # Windows 下需设为 false